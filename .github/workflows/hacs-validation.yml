name: HACS Validation

on:
  pull_request:
  push:
    branches:
      - "**"

jobs:
  hacs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate HACS integration
        uses: hacs/action@main
        with:
          category: integration
