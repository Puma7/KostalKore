name: HACS Validation

# PR events cover all branch work; pushes to main (merges) still run.
on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: hacs-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege token: HACS validation only needs to read the repository.
permissions:
  contents: read

jobs:
  hacs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate HACS integration
        uses: hacs/action@main
        with:
          category: integration
          # Repo metadata checks (description/topics/brands) are managed in GitHub settings.
          # integration_manifest/hacsjson use raw.githubusercontent URLs that do not resolve slash refs.
          ignore: description topics brands integration_manifest hacsjson
