name: CI

on:
  pull_request:
  push:
    branches:
      - "**"

# Least-privilege token: this workflow only checks out and runs tests/mypy.
permissions:
  contents: read

jobs:
  test-and-typecheck:
    runs-on: ubuntu-latest
    name: test (py${{ matrix.python-version }})
    strategy:
      fail-fast: false
      matrix:
        # Home Assistant pins a single Python minor version at a time (ADR-0020);
        # since HA 2026.3 that is Python 3.14. We test against BOTH:
        #   - "3.14": the Python version current Home Assistant ships with, so the
        #     smoke tests always cover the runtime real users are on. Bump this
        #     whenever Home Assistant raises its required Python version.
        #   - "3.12": our manifest floor (homeassistant: 2024.1.0 -> Python 3.11/3.12),
        #     so we do not regress on the oldest HA release we still support.
        python-version: ["3.12", "3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "${{ matrix.python-version }}"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_test.txt
          pip install "pykoplenti==1.5.0" "pymodbus>=3.6"

      - name: Run ruff (lint gate)
        run: python -m ruff check custom_components/kostal_kore Tests

      - name: Run tests
        run: python -m pytest Tests/ -v --timeout=60

      # Type-check against the floor leg only. Current Home Assistant source uses
      # Python 3.14-only syntax (PEP 758) that mypy cannot parse under our 3.12
      # target, and strict `warn_unused_ignores` cannot be satisfied against two
      # different HA stub sets at once. The 3.14 leg still runs the full test
      # suite as the current-HA runtime smoke test.
      - name: Run mypy
        if: matrix.python-version == '3.12'
        run: python -m mypy custom_components/kostal_kore/
