name: CI

on:
  pull_request:
  push:
    branches:
      - "**"

jobs:
  test-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_test.txt
          pip install "pykoplenti==1.5.0" "pymodbus>=3.6"

      - name: Run tests
        run: python -m pytest Tests/ -v --timeout=60

      - name: Run mypy
        run: python -m mypy kostal_plenticore/
