quality_scale: platinum
rules:
  # ============================================================
  # Bronze (all done)
  # ============================================================
  action-setup:
    status: exempt
    comment: "Integration does not provide custom actions/services."
  appropriate-polling:
    status: done
    comment: "Uses DataUpdateCoordinator with configurable intervals."
  brands:
    status: done
    comment: "Brand defined in manifest.json."
  common-modules:
    status: done
    comment: "Uses HA common modules (DataUpdateCoordinator, ConfigEntry, DeviceInfo, etc.)."
  config-flow-test-coverage:
    status: done
    comment: "Config flow tests in Tests/."
  config-flow:
    status: done
    comment: "Full config flow with user, reauth, and reconfigure steps."
  dependency-transparency:
    status: done
    comment: "Dependencies declared in manifest.json: pykoplenti and pymodbus."
  docs-actions:
    status: exempt
    comment: "No custom actions/services."
  docs-high-level-description:
    status: done
    comment: "README.md contains high-level description."
  docs-installation-instructions:
    status: done
    comment: "README.md contains installation instructions."
  docs-removal-instructions:
    status: done
    comment: "Standard HA integration removal via UI."
  entity-event-setup:
    status: exempt
    comment: "No event entities."
  entity-unique-id:
    status: done
    comment: "All entities have unique IDs based on config entry + module + key."
  has-entity-name:
    status: done
    comment: "All entities set _attr_has_entity_name = True."
  runtime-data:
    status: done
    comment: "Uses entry.runtime_data for Plenticore instance."
  test-before-configure:
    status: done
    comment: "Config flow tests API connection before saving."
  test-before-setup:
    status: done
    comment: "async_setup_entry validates connection before platform setup."
  unique-config-entry:
    status: done
    comment: "Uniqueness enforced by host in config flow."

  # ============================================================
  # Silver (all done)
  # ============================================================
  config-entry-unloading:
    status: done
    comment: "async_unload_entry properly unloads platforms and logs out."
  log-when-unavailable:
    status: done
    comment: "Coordinator logs warnings/errors when API is unreachable."
  entity-unavailable:
    status: done
    comment: "Entities return unavailable when coordinator data is None."
  integration-owner:
    status: done
    comment: "Maintained in custom repo."
  parallel-updates:
    status: done
    comment: "PARALLEL_UPDATES = 0 set in all platform modules (sensor, switch, number, select). Coordinator serialises all API calls."
  reauthentication-flow:
    status: done
    comment: "Implemented via async_step_reauth and async_step_reauth_confirm."
  test-coverage:
    status: done
    comment: "100% test coverage across all integration modules (133 tests)."

  # ============================================================
  # Gold
  # ============================================================
  devices:
    status: done
    comment: "All entities expose DeviceInfo with identifiers, model, manufacturer, sw_version."
  diagnostics:
    status: done
    comment: "diagnostics.py provides async_get_config_entry_diagnostics."
  discovery:
    status: done
    comment: "Config flow supports manual host entry and best-effort local IPv4 auto-discovery."
  discovery-update-info:
    status: done
    comment: "Auto-discovery is attempted when host is left empty in the setup wizard."
  docs-data-update:
    status: done
    comment: "README.md documents update intervals and coordinator behaviour."
  docs-examples:
    status: done
    comment: "README.md contains usage examples."
  docs-known-limitations:
    status: done
    comment: "README.md documents known limitations (firmware, DC strings, etc.)."
  docs-supported-devices:
    status: done
    comment: "README.md lists supported Kostal Plenticore models."
  docs-supported-functions:
    status: done
    comment: "README.md documents all supported sensors, switches, numbers, and selects."
  docs-troubleshooting:
    status: done
    comment: "README.md contains troubleshooting section."
  docs-use-cases:
    status: done
    comment: "README.md contains use-case examples (Energy Dashboard, automations)."
  dynamic-devices:
    status: exempt
    comment: "Single inverter device per config entry; no sub-devices."
  entity-category:
    status: done
    comment: "Diagnostic and config entities use appropriate EntityCategory."
  entity-device-class:
    status: done
    comment: "Power, energy, voltage, current, battery, frequency sensors use correct device classes."
  entity-disabled-by-default:
    status: done
    comment: "Advanced/installer entities disabled by default; core sensors enabled."
  entity-translations:
    status: done
    comment: "All entities have translation_key mapped to strings.json / en.json."
  exception-translations:
    status: done
    comment: "HomeAssistantError uses translation_domain + translation_key with placeholders."
  icon-translations:
    status: done
    comment: "icons.json provides icon definitions for sensor and number entities."
  reconfiguration-flow:
    status: done
    comment: "async_step_reconfigure in config_flow.py."
  repair-issues:
    status: done
    comment: "repairs.py creates issues for auth_failed, api_unreachable, inverter_busy, installer_required."
  stale-devices:
    status: done
    comment: "async_remove_config_entry_device in __init__.py allows removal of stale devices."
  test-coverage-full:
    status: done
    comment: "100% test coverage verified with pytest-cov."

  # ============================================================
  # Platinum (all done)
  # ============================================================
  async-dependency:
    status: done
    comment: "pykoplenti is fully async (aiohttp-based)."
  inject-websession:
    status: done
    comment: "Uses async_get_clientsession(hass) for shared aiohttp session."
  strict-typing:
    status: done
    comment: "mypy --strict --ignore-missing-imports passes with 0 errors. py.typed marker present."
