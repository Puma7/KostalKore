[mypy]
python_version = 3.12
strict = True
warn_unused_ignores = True
warn_redundant_casts = True
warn_unused_configs = True

[mypy-homeassistant.*]
ignore_missing_imports = True

[mypy-pykoplenti.*]
ignore_missing_imports = True

[mypy-aiohttp.*]
ignore_missing_imports = True

[mypy-pymodbus.*]
ignore_missing_imports = True
